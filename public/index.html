<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login · MyApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --card:      #13131a;
      --border:    #2a2a3a;
      --accent:    #6c63ff;
      --accent2:   #ff6584;
      --text:      #e8e8f0;
      --muted:     #7a7a9a;
      --success:   #4ade80;
      --error:     #f87171;
      --radius:    14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* animated mesh background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(108,99,255,.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 80%, rgba(255,101,132,.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 32px 80px rgba(0,0,0,.5);
      animation: rise .5s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes rise {
      from { opacity:0; transform: translateY(24px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      letter-spacing: -1px;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); display: inline-block; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 32px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
    }
    .tab.active {
      background: var(--card);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }

    /* Forms */
    .form { display: none; flex-direction: column; gap: 16px; }
    .form.active { display: flex; animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: .78rem; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }

    .field input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,.15);
    }
    .field input::placeholder { color: var(--muted); }

    .btn {
      margin-top: 4px;
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: .02em;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      position: relative;
      overflow: hidden;
    }
    .btn:hover  { opacity: .9; }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .btn .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn.loading .btn-text { display: none; }
    .btn.loading .spinner { display: block; }

    /* Alert */
    .alert {
      display: none;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: .88rem;
      font-weight: 500;
      animation: fadeIn .2s;
    }
    .alert.error   { background: rgba(248,113,113,.12); color: var(--error);   border: 1px solid rgba(248,113,113,.25); }
    .alert.success { background: rgba(74,222,128,.12);  color: var(--success); border: 1px solid rgba(74,222,128,.25); }
    .alert.show    { display: block; }

    /* Welcome screen */
    #welcome {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
      animation: fadeIn .4s ease;
    }
    #welcome.show { display: flex; }
    .welcome-icon { font-size: 3rem; }
    .welcome-name { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 700; }
    .welcome-sub  { color: var(--muted); font-size: .9rem; }
    .logout-btn {
      margin-top: 8px;
      padding: 10px 28px;
      border: 1px solid var(--border);
      border-radius: 50px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem;
      cursor: pointer;
      transition: all .2s;
    }
    .logout-btn:hover { color: var(--text); border-color: var(--text); }
  </style>
</head>
<body>

<div class="card">

  <!-- Logo -->
  <div class="logo"><span class="logo-dot"></span>MyApp</div>

  <!-- Welcome screen (shown after login) -->
  <div id="welcome">
    <div class="welcome-icon">👋</div>
    <div class="welcome-name" id="welcome-name">Hello!</div>
    <div class="welcome-sub">You're logged in successfully.</div>
    <button class="logout-btn" onclick="logout()">Log out</button>
  </div>

  <!-- Auth section -->
  <div id="auth-section">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Log In</button>
      <button class="tab"        onclick="switchTab('register')">Register</button>
    </div>

    <!-- Alert -->
    <div class="alert" id="alert"></div>

    <!-- Login form -->
    <form class="form active" id="login-form" onsubmit="handleLogin(event)">
      <div class="field">
        <label>Email</label>
        <input type="email" id="l-email" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="l-password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn" id="login-btn">
        <span class="btn-text">Log In</span>
        <div class="spinner"></div>
      </button>
    </form>

    <!-- Register form -->
    <form class="form" id="register-form" onsubmit="handleRegister(event)">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="r-name" placeholder="Jane Doe" required />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="r-email" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="r-password" placeholder="Min. 6 characters" required minlength="6"/>
      </div>
      <button type="submit" class="btn" id="register-btn">
        <span class="btn-text">Create Account</span>
        <div class="spinner"></div>
      </button>
    </form>
  </div>

</div>

<script>
  let activeTab = 'login';

  function switchTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
    document.getElementById('login-form').classList.toggle('active', tab === 'login');
    document.getElementById('register-form').classList.toggle('active', tab === 'register');
    hideAlert();
  }

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert ${type} show`;
  }
  function hideAlert() {
    document.getElementById('alert').className = 'alert';
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.classList.toggle('loading', loading);
    btn.disabled = loading;
  }

  async function handleLogin(e) {
    e.preventDefault();
    hideAlert();
    setLoading('login-btn', true);
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('l-email').value, password: document.getElementById('l-password').value })
      });
      const data = await res.json();
      if (!res.ok) { showAlert(data.error, 'error'); return; }
      // Save user info and redirect to dashboard
      localStorage.setItem('portfolio_user', JSON.stringify(data.user));
      window.location.href = '/home.html';
    } catch { showAlert('Could not connect to server.', 'error'); }
    finally { setLoading('login-btn', false); }
  }

  async function handleRegister(e) {
    e.preventDefault();
    hideAlert();
    setLoading('register-btn', true);
    try {
      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: document.getElementById('r-name').value, email: document.getElementById('r-email').value, password: document.getElementById('r-password').value })
      });
      const data = await res.json();
      if (!res.ok) { showAlert(data.error, 'error'); return; }
      showAlert(data.message, 'success');
      document.getElementById('register-form').reset();
      setTimeout(() => switchTab('login'), 1800);
    } catch { showAlert('Could not connect to server.', 'error'); }
    finally { setLoading('register-btn', false); }
  }

  function showWelcome(name) {
    document.getElementById('auth-section').style.display = 'none';
    document.getElementById('welcome-name').textContent = `Hello, ${name}!`;
    document.getElementById('welcome').classList.add('show');
  }

  function logout() {
    document.getElementById('welcome').classList.remove('show');
    document.getElementById('auth-section').style.display = '';
    hideAlert();
    switchTab('login');
  }
</script>
</body>
</html>
