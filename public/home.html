<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard · MyPortfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07070f;
      --surface:   #0f0f1a;
      --card:      #13131f;
      --border:    #1e1e30;
      --accent:    #00e5b0;
      --accent2:   #ff4d6d;
      --accent3:   #7b61ff;
      --text:      #eeeef5;
      --muted:     #5a5a7a;
      --sidebar-w: 260px;
    }

    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      overflow: hidden;
    }

    /* ── Noise grain overlay ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999; opacity: .35;
    }

    /* ══════════════════════════════
       SIDEBAR
    ══════════════════════════════ */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 32px 0;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
      animation: slideIn .5s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes slideIn { from { transform: translateX(-20px); opacity:0; } to { transform: none; opacity:1; } }

    .sidebar-logo {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 1.35rem;
      letter-spacing: -0.5px;
      color: var(--text);
      padding: 0 28px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-mark {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: grid; place-items: center;
      color: var(--bg);
      font-size: .85rem;
      font-weight: 700;
      font-family: 'IBM Plex Mono', monospace;
      flex-shrink: 0;
    }

    nav { padding: 24px 16px; flex: 1; }

    .nav-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: .62rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 12px;
      margin-bottom: 8px;
      margin-top: 20px;
    }
    .nav-label:first-child { margin-top: 0; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-radius: 10px;
      color: var(--muted);
      font-size: .9rem;
      font-weight: 400;
      cursor: pointer;
      transition: all .2s;
      text-decoration: none;
      margin-bottom: 2px;
    }
    .nav-item:hover { background: var(--card); color: var(--text); }
    .nav-item.active { background: rgba(0,229,176,.08); color: var(--accent); }
    .nav-item .icon { font-size: 1rem; width: 20px; text-align: center; }
    .nav-badge {
      margin-left: auto;
      background: var(--accent);
      color: var(--bg);
      font-size: .65rem;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 20px;
    }

    .sidebar-footer {
      padding: 20px 20px 0;
      border-top: 1px solid var(--border);
    }
    .logout-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 11px 14px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      cursor: pointer;
      transition: all .2s;
    }
    .logout-btn:hover { background: rgba(255,77,109,.08); color: var(--accent2); }

    /* ══════════════════════════════
       MAIN CONTENT
    ══════════════════════════════ */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 40px 44px;
      animation: fadeUp .6s .1s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes fadeUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: none; } }

    /* Scrollbar */
    .main::-webkit-scrollbar { width: 4px; }
    .main::-webkit-scrollbar-track { background: transparent; }
    .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 40px;
    }
    .greeting-sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: .72rem;
      color: var(--accent);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .greeting-name {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -.5px;
      line-height: 1.1;
    }
    .topbar-date {
      font-family: 'IBM Plex Mono', monospace;
      font-size: .75rem;
      color: var(--muted);
      text-align: right;
      margin-top: 6px;
    }

    /* ── Stats grid ── */
    .section-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: .7rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 36px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px 20px;
      position: relative;
      overflow: hidden;
      transition: transform .2s, border-color .2s;
      animation: fadeUp .5s both;
    }
    .stat-card:nth-child(1) { animation-delay: .15s; }
    .stat-card:nth-child(2) { animation-delay: .2s; }
    .stat-card:nth-child(3) { animation-delay: .25s; }
    .stat-card:nth-child(4) { animation-delay: .3s; }
    .stat-card:hover { transform: translateY(-3px); border-color: #2e2e48; }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 60px; height: 60px;
      border-radius: 0 16px 0 60px;
      opacity: .07;
    }
    .stat-card[data-color="teal"]::before   { background: var(--accent); }
    .stat-card[data-color="pink"]::before   { background: var(--accent2); }
    .stat-card[data-color="purple"]::before { background: var(--accent3); }
    .stat-card[data-color="gold"]::before   { background: #f4c542; }

    .stat-icon { font-size: 1.3rem; margin-bottom: 14px; }
    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-card[data-color="teal"]   .stat-value { color: var(--accent); }
    .stat-card[data-color="pink"]   .stat-value { color: var(--accent2); }
    .stat-card[data-color="purple"] .stat-value { color: var(--accent3); }
    .stat-card[data-color="gold"]   .stat-value { color: #f4c542; }
    .stat-label {
      font-size: .78rem;
      color: var(--muted);
      font-weight: 400;
    }

    /* ── Lower grid (profile + activity) ── */
    .lower-grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
    }

    /* Profile card */
    .profile-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      animation: fadeUp .5s .35s both;
    }

    .avatar-wrap {
      position: relative;
      width: 72px; height: 72px;
    }
    .avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent3), var(--accent));
      display: grid; place-items: center;
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--bg);
      border: 3px solid var(--border);
    }
    .avatar-status {
      position: absolute;
      bottom: 3px; right: 3px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--card);
    }

    .profile-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -.3px;
    }
    .profile-role {
      font-size: .78rem;
      color: var(--accent);
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: .06em;
      margin-top: 2px;
    }

    .profile-divider { height: 1px; background: var(--border); }

    .profile-row {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .profile-field { display: flex; flex-direction: column; gap: 3px; }
    .profile-field-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: .62rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
    }
    .profile-field-value { font-size: .85rem; color: var(--text); word-break: break-all; }

    .edit-btn {
      width: 100%;
      padding: 11px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem;
      cursor: pointer;
      transition: all .2s;
    }
    .edit-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,229,176,.05); }

    /* Activity log */
    .activity-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px;
      animation: fadeUp .5s .4s both;
    }

    .activity-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .activity-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
    }
    .activity-count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: .7rem;
      color: var(--muted);
    }

    .activity-list { display: flex; flex-direction: column; gap: 4px; }

    .activity-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      transition: background .15s;
    }
    .activity-item:hover { background: var(--surface); }

    .activity-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-teal   { background: var(--accent); }
    .dot-pink   { background: var(--accent2); }
    .dot-purple { background: var(--accent3); }
    .dot-gold   { background: #f4c542; }
    .dot-muted  { background: var(--muted); }

    .activity-info { flex: 1; }
    .activity-action { font-size: .88rem; color: var(--text); }
    .activity-detail { font-size: .75rem; color: var(--muted); margin-top: 2px; }

    .activity-time {
      font-family: 'IBM Plex Mono', monospace;
      font-size: .68rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* Responsive */
    @media (max-width: 1100px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 860px) {
      .main { padding: 28px 20px; }
      .lower-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ═══════════ SIDEBAR ═══════════ -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">P</div>
    Portfolio
  </div>

  <nav>
    <div class="nav-label">Main</div>
    <a class="nav-item active" href="#">
      <span class="icon">⬡</span> Dashboard
    </a>
    <a class="nav-item" href="#">
      <span class="icon">◈</span> Projects
      <span class="nav-badge">4</span>
    </a>
    <a class="nav-item" href="#">
      <span class="icon">◇</span> Skills
    </a>
    <a class="nav-item" href="#">
      <span class="icon">◎</span> Experience
    </a>

    <div class="nav-label">Personal</div>
    <a class="nav-item" href="#">
      <span class="icon">◉</span> Profile
    </a>
    <a class="nav-item" href="#">
      <span class="icon">⬙</span> Settings
    </a>
  </nav>

  <div class="sidebar-footer">
    <button class="logout-btn" onclick="logout()">
      <span>⎋</span> Log out
    </button>
  </div>
</aside>

<!-- ═══════════ MAIN ═══════════ -->
<main class="main">

  <!-- Top bar -->
  <div class="topbar">
    <div>
      <div class="greeting-sub">Welcome back</div>
      <div class="greeting-name" id="greeting-name">Loading…</div>
    </div>
    <div class="topbar-date" id="topbar-date"></div>
  </div>

  <!-- Stats -->
  <div class="section-title">Overview</div>
  <div class="stats-grid">
    <div class="stat-card" data-color="teal">
      <div class="stat-icon">📁</div>
      <div class="stat-value">12</div>
      <div class="stat-label">Projects</div>
    </div>
    <div class="stat-card" data-color="pink">
      <div class="stat-icon">👁</div>
      <div class="stat-value">3.4k</div>
      <div class="stat-label">Profile Views</div>
    </div>
    <div class="stat-card" data-color="purple">
      <div class="stat-icon">⚡</div>
      <div class="stat-value">8</div>
      <div class="stat-label">Skills Listed</div>
    </div>
    <div class="stat-card" data-color="gold">
      <div class="stat-icon">✦</div>
      <div class="stat-value">5</div>
      <div class="stat-label">Endorsements</div>
    </div>
  </div>

  <!-- Profile + Activity -->
  <div class="lower-grid">

    <!-- Profile card -->
    <div class="profile-card">
      <div class="avatar-wrap">
        <div class="avatar" id="avatar-initials">?</div>
        <div class="avatar-status"></div>
      </div>
      <div>
        <div class="profile-name" id="profile-name">—</div>
        <div class="profile-role">Portfolio Member</div>
      </div>
      <div class="profile-divider"></div>
      <div class="profile-row">
        <div class="profile-field">
          <span class="profile-field-label">Email</span>
          <span class="profile-field-value" id="profile-email">—</span>
        </div>
        <div class="profile-field">
          <span class="profile-field-label">Member Since</span>
          <span class="profile-field-value" id="profile-joined">—</span>
        </div>
        <div class="profile-field">
          <span class="profile-field-label">Status</span>
          <span class="profile-field-value" style="color: var(--accent);">● Active</span>
        </div>
      </div>
      <button class="edit-btn">Edit Profile</button>
    </div>

    <!-- Activity log -->
    <div class="activity-card">
      <div class="activity-header">
        <div class="activity-title">Recent Activity</div>
        <div class="activity-count" id="activity-count">— events</div>
      </div>
      <div class="activity-list" id="activity-list">
        <!-- filled by JS -->
      </div>
    </div>

  </div>
</main>

<script>
  // ── Guard: redirect to login if no user in storage ──
  const raw = localStorage.getItem('portfolio_user');
  if (!raw) { window.location.href = '/'; }

  const user = JSON.parse(raw || '{}');

  // ── Greeting ──
  const hour = new Date().getHours();
  const timeGreet = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
  document.getElementById('greeting-name').textContent = `${timeGreet}, ${user.name || 'there'}.`;

  // ── Date ──
  const now = new Date();
  document.getElementById('topbar-date').textContent =
    now.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  // ── Profile card ──
  const initials = (user.name || '?').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('avatar-initials').textContent = initials;
  document.getElementById('profile-name').textContent  = user.name  || '—';
  document.getElementById('profile-email').textContent = user.email || '—';

  // joined date from server or fallback to today
  const joined = user.created_at
    ? new Date(user.created_at).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' })
    : now.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
  document.getElementById('profile-joined').textContent = joined;

  // ── Activity ──
  const activities = [
    { dot:'dot-teal',   action:'Logged in successfully',        detail:'Dashboard accessed',         time:'Just now' },
    { dot:'dot-purple', action:'Profile created',               detail:'Welcome to your portfolio!', time:'Today' },
    { dot:'dot-pink',   action:'Stats updated',                 detail:'Profile views refreshed',    time:'1 hr ago' },
    { dot:'dot-gold',   action:'Projects section visited',      detail:'4 projects available',       time:'2 hrs ago' },
    { dot:'dot-muted',  action:'Settings configured',           detail:'Defaults applied',           time:'Yesterday' },
  ];

  document.getElementById('activity-count').textContent = `${activities.length} events`;

  const list = document.getElementById('activity-list');
  activities.forEach(a => {
    list.innerHTML += `
      <div class="activity-item">
        <div class="activity-dot ${a.dot}"></div>
        <div class="activity-info">
          <div class="activity-action">${a.action}</div>
          <div class="activity-detail">${a.detail}</div>
        </div>
        <div class="activity-time">${a.time}</div>
      </div>`;
  });

  // ── Logout ──
  function logout() {
    localStorage.removeItem('portfolio_user');
    window.location.href = '/';
  }
</script>
</body>
</html>
